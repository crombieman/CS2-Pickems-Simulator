name: odds-archive

on:
  schedule:
    - cron: "17 */2 * * *"   # every 2h at :17 (off-peak minute — GH cron jitter/skips cluster at :00)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: odds-archive
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # pure stdlib — no pip install needed
      - name: Snapshot Polymarket
        run: python src/fetch_anchors.py --live-anchors
      - name: Commit archive if changed
        run: |
          git config user.name "odds-archive-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/odds_archive.jsonl data/live_anchors.json
          if git diff --cached --quiet; then
            echo "No matching open markets — nothing to commit."
            exit 0
          fi
          git commit -m "chore: odds snapshot [skip ci]"
          git pull --rebase origin master
          git push

# registration nudge: indexer missed the initial non-default-branch push
